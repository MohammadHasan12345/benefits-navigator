<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Benefits Navigator — Thumbnail (560×280)</title>
<style>
  body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
    background:#eef5f2;font-family:system-ui,"Segoe UI",Arial,sans-serif}
  .frame{box-shadow:0 24px 60px -24px rgba(11,70,60,.5);border-radius:20px;overflow:hidden;line-height:0}
  button{font:inherit;font-weight:700;font-size:15px;cursor:pointer;border:none;color:#fff;
    background:linear-gradient(135deg,#0f766e,#14b8a6);padding:13px 24px;border-radius:12px;
    box-shadow:0 12px 28px -14px rgba(15,118,110,.7)}
  button:hover{transform:translateY(-2px)}
  p{color:#46615a;font-size:13px;margin:0}
</style>
</head>
<body>
<div class="frame">
<svg id="card" width="560" height="280" viewBox="0 0 560 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="0.55" stop-color="#0d9488"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <radialGradient id="g1" cx="0.86" cy="0.12" r="0.55">
      <stop offset="0" stop-color="#99f6e4" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#99f6e4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0.08" cy="0.96" r="0.55">
      <stop offset="0" stop-color="#fcd34d" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#fcd34d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="560" height="280" rx="20" fill="url(#bg)"/>
  <rect width="560" height="280" rx="20" fill="url(#g1)"/>
  <rect width="560" height="280" rx="20" fill="url(#g2)"/>

  <g transform="translate(40,36)">
    <rect width="46" height="46" rx="14" fill="#ffffff" fill-opacity="0.16" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.2"/>
    <path d="M11 24 L23 12 L35 24 M15 22 v12 h16 v-12 M20 34 v-7 h6 v7" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="60" y="20" font-size="20" font-weight="800" fill="#ffffff" letter-spacing="-0.3">Benefits Navigator</text>
    <text x="60" y="39" font-size="12.5" font-weight="600" fill="#d1fae5">AI caseworker · all 50 states · free &amp; private</text>
  </g>

  <text x="40" y="152" font-size="35" font-weight="800" fill="#ffffff" letter-spacing="-0.8">Find the help you</text>
  <text x="40" y="193" font-size="35" font-weight="800" fill="#fde68a" letter-spacing="-0.8">may qualify for.</text>

  <g transform="translate(40,224)">
    <g>
      <rect width="150" height="32" rx="16" fill="#ffffff" fill-opacity="0.18"/>
      <circle cx="20" cy="16" r="8.5" fill="#34d399"/>
      <path d="M16.5 16 l2.4 2.4 l4.1 -4.6" fill="none" stroke="#064e3b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="35" y="20.5" font-size="13" font-weight="700" fill="#ffffff">Likely eligible</text>
    </g>
    <g transform="translate(162,0)">
      <rect width="150" height="32" rx="16" fill="#ffffff" fill-opacity="0.18"/>
      <path d="M20 8 L28 22 H12 Z" fill="#fbbf24"/>
      <path d="M20 13 v4" stroke="#7c2d12" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="20" cy="19.5" r="1" fill="#7c2d12"/>
      <text x="35" y="20.5" font-size="13" font-weight="700" fill="#ffffff">Might qualify</text>
    </g>
  </g>

  <text x="520" y="263" text-anchor="end" font-size="12" font-weight="600" fill="#d1fae5">benefits-navigator-theta.vercel.app</text>
</svg>
</div>

<button onclick="downloadPNG()">⬇ Download PNG (560 × 280)</button>
<p>Click the button, then upload the saved PNG as your Card &amp; Thumbnail Image.</p>

<script>
function downloadPNG(){
  const svg=document.getElementById('card');
  const xml=new XMLSerializer().serializeToString(svg);
  const blob=new Blob(['<?xml version="1.0" encoding="UTF-8"?>'+xml],{type:'image/svg+xml;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const img=new Image();
  img.onload=function(){
    const scale=2; // export at 2x for crisp upload (1120x560, still 2:1)
    const c=document.createElement('canvas'); c.width=560*scale; c.height=280*scale;
    const ctx=c.getContext('2d'); ctx.scale(scale,scale); ctx.drawImage(img,0,0,560,280);
    URL.revokeObjectURL(url);
    c.toBlob(function(b){
      const a=document.createElement('a');
      a.href=URL.createObjectURL(b); a.download='benefits-navigator-thumbnail.png'; a.click();
    },'image/png');
  };
  img.src=url;
}
</script>
</body>
</html>
